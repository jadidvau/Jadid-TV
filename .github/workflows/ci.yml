name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Keep pinned in lockstep with AGP in gradle/libs.versions.toml.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.1.0"
          # Only let pushes to main write to the shared Gradle cache; PRs read it.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit tests
        run: gradle --no-daemon testDebugUnitTest

      # No signing secrets here — fork PRs cannot read them. app/build.gradle.kts
      # falls back to an unsigned release, which still catches compile/packaging
      # breakage. The Release workflow produces the signed artifact.
      - name: Build unsigned release APK
        run: gradle --no-daemon assembleRelease

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/
          if-no-files-found: ignore
