name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Java 21, not 17: Robolectric maps API 36 -> required Java 21
      # (DefaultSdkProvider), and the @Config(sdk=[36]) tests throw
      # "Android SDK 36 requires Java 21" on anything older.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # AGP 9.1.1 (gradle/libs.versions.toml) requires Gradle >= 9.3.1.
      # Bump this whenever AGP's minimum moves.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"
          # Only let pushes to main write to the shared Gradle cache; PRs read it.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # Robolectric pulls its ~100MB android-all-instrumented SDK image into
      # ~/.m2, which setup-gradle does not cache. Without this every run
      # re-downloads it from Maven Central.
      - name: Cache Robolectric SDK jars
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/robolectric
          key: robolectric-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: robolectric-${{ runner.os }}-

      - name: Run unit tests
        run: gradle --no-daemon testDebugUnitTest

      # No signing secrets here — fork PRs cannot read them. app/build.gradle.kts
      # falls back to an unsigned release, which still catches compile/packaging
      # breakage. The Release workflow produces the signed artifact.
      - name: Build unsigned release APK
        run: gradle --no-daemon assembleRelease

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/
          if-no-files-found: ignore
