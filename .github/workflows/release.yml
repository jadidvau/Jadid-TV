name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v (e.g. 1.2.3)"
        required: true
      prerelease:
        description: "Mark the GitHub release as a pre-release"
        type: boolean
        default: false

permissions:
  contents: write # required to create the GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            name="${{ inputs.version }}"
          else
            name="$GITHUB_REF_NAME"
          fi
          name="${name#v}" # tolerate both "1.2.3" and "v1.2.3"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          # run_number is monotonic per workflow, which is all Play requires.
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      # Three outcomes:
      #   all three secrets set  -> "upload"    (real, publishable key)
      #   none of them set       -> "ephemeral" (throwaway key generated below)
      #   some but not all       -> hard error  (a typo'd secret name must never
      #                                          silently downgrade a real release)
      - name: Resolve signing mode
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          count=0; missing=""
          for v in KEYSTORE_BASE64 STORE_PASSWORD KEY_PASSWORD; do
            if [ -n "${!v}" ]; then count=$((count + 1)); else missing="$missing $v"; fi
          done

          if [ "$count" -eq 3 ]; then
            echo "mode=upload" >> "$GITHUB_OUTPUT"
            echo "suffix=" >> "$GITHUB_OUTPUT"
          elif [ "$set" -eq 0 ]; then
            echo "mode=ephemeral" >> "$GITHUB_OUTPUT"
            echo "suffix=-devsigned" >> "$GITHUB_OUTPUT"
            echo "::warning::No signing secrets. Building with a throwaway key generated for this run."
            echo "::warning::The result is installable but NOT publishable, and cannot upgrade any other build in place."
          else
            echo "::error::Partial signing config — set all three secrets or none. Missing:$missing"
            exit 1
          fi

      # Kept at 21 to match ci.yml (Robolectric needs Java 21 for API 36).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # No Gradle wrapper is committed, so provision Gradle explicitly.
      # AGP 9.1.1 (gradle/libs.versions.toml) requires Gradle >= 9.3.1.
      # Bump this whenever AGP's minimum moves.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      - name: Write .env for the Secrets Gradle plugin
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::warning::GEMINI_API_KEY secret unset; falling back to the .env.example placeholder."
          else
            printf 'GEMINI_API_KEY=%s\n' "$GEMINI_API_KEY" > .env
          fi

      - name: Decode upload keystore
        if: steps.signing.outputs.mode == 'upload'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.jks"

      # Fallback so a fresh clone / secret-less repo still yields an installable
      # APK. Password is the literal "android" — there is nothing to protect, the
      # key is discarded when the runner is torn down.
      - name: Generate throwaway keystore
        if: steps.signing.outputs.mode == 'ephemeral'
        run: |
          keytool -genkeypair -v \
            -keystore "$RUNNER_TEMP/upload.jks" \
            -alias upload \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Jadid TV CI, OU=CI, O=Jadid TV, L=None, S=None, C=US"

      - name: Build signed APK and AAB
        env:
          # app/build.gradle.kts resolves this with file(), which is relative to
          # the app module — so it must be absolute.
          KEYSTORE_PATH: ${{ runner.temp }}/upload.jks
          # Fallbacks match the throwaway keystore generated above.
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'android' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'upload' }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
        run: gradle --no-daemon assembleRelease bundleRelease

      - name: Verify the APK is actually signed
        run: |
          apk=app/build/outputs/apk/release/app-release.apk
          build_tools=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          "$build_tools/apksigner" verify --print-certs "$apk"

      - name: Stage artifacts
        id: stage
        run: |
          v="${{ steps.version.outputs.name }}${{ steps.signing.outputs.suffix }}"
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/jadid-tv-$v.apk"
          cp app/build/outputs/bundle/release/app-release.aab "dist/jadid-tv-$v.aab"
          (cd dist && sha256sum ./*.apk ./*.aab > checksums.txt)

      - name: Always keep the build outputs, even on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/
          if-no-files-found: warn

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: v${{ steps.version.outputs.name }}
          generate_release_notes: true
          # A throwaway-signed build must never sit at /releases/latest.
          prerelease: ${{ steps.signing.outputs.mode == 'ephemeral' || inputs.prerelease || false }}
          body: ${{ steps.signing.outputs.mode == 'ephemeral' && '> **Unofficial build.** Signed with a throwaway key generated in CI, so it is installable for testing but cannot be published, and cannot upgrade an existing install in place — uninstall first.' || '' }}
          append_body: true
          files: |
            dist/*.apk
            dist/*.aab
            dist/checksums.txt

      - name: Clean up keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/upload.jks" .env
